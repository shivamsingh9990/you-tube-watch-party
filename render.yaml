# Render Blueprint: frontend static site (backend is already deployed separately)
# https://you-tube-watch-party-2.onrender.com = API + Socket.io
#
# Create the static site manually if you prefer:
#   Root Directory: client
#   Build Command: npm install && npm run build
#   Publish Directory: dist
#   Env: VITE_API_URL=https://you-tube-watch-party-2.onrender.com

services:
  - type: web
    name: watch-party-frontend
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://you-tube-watch-party-2.onrender.com
      # Set to this static site's onrender.com URL after first deploy:
      # - key: VITE_APP_URL
      #   value: https://YOUR-FRONTEND-NAME.onrender.com
